# в”Ђв”Ђв”Ђ sets.yaml В· the atlas descriptor table (AUTHORED В· operator-reviewed) в”Ђв”Ђв”Ђ
#
# The ONE authored input of the language atlas (mega-plan В§2 В· В§3). Every
# canonical set the site projects is DECLARED here exactly once: which layer
# owns it, which gated source carries its members, which surface renders them
# (rooms or anchors), and what unique data justifies a room (the
# three-conditions law). build-atlas.mjs (WO-2) compiles this file plus the
# gated sources into atlas.generated.ts + the served twin; nothing downstream
# re-declares a set.
#
# LAWS OF THIS FILE
#  В· counts are NEVER written here В· they derive from the sources at build
#    time (census.mjs is the executable proof the sources carry them).
#  В· member lists appear here ONLY for the closed versioned-constant sets
#    (edge kinds В· gate predicates В· permit families В· secret sources В·
#    conformance levels В· truth words): sets the spec defines in prose,
#    deliberately not counted in canon.yaml. Each mirrors its chapter at the
#    current pin and is revised when a wave extends it (W-DEC В· W5).
#  В· `surface: rooms` REQUIRES `unique_data` naming a real source field В·
#    otherwise the compiler refuses to generate rooms (ratchet В§6.2).
#  В· a surface that does not exist yet carries `lands: wo-N` + a waiver В·
#    the ratchet prints waivers by name instead of deducting, and every
#    waiver dies in the WO that lands the surface.
#  В· openers are the quotable definitional voice of each node (2-3
#    sentences, rendered at the top of its page and served in the twin).
#    They carry no canonical numerals: counts render adjacent via
#    CanonCount, which links every figure to its source.
#
# Review protocol (operator): the openers В· the room-vs-anchor verdicts В·
# the waivers В· the moved entries В· the versioned member constants. Everything
# else is derivation plumbing the gates judge.

atlas_descriptors: 1
revised: 2026-07-15

# в”Ђв”Ђв”Ђ the seven layers В· the anatomy (order = the reading order of the atlas В·
#     /map is the cover, hubs chain prev/next in this order) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
layers:
  - id: shape
    title: The shape
    hub: /language
    hub_exists: true
    opener: >-
      The shape layer is every word an author can type: the envelope, the
      task grammar, the namespaces that scope every value. If a key is not
      declared here, it is not Nika.
    sections:
      - { id: namespaces, anchor: namespaces, title: The namespaces }
      - { id: expressions, anchor: expressions, title: Expressions,
          note: "CEL subset in ${{ }} В· size() is the only function В· jq lives on output" }
      - { id: types-slot, anchor: types, title: Types, slot: W3 }

  - id: flow
    title: The flow
    hub: /flow
    hub_exists: true
    atlas_route: true
    opener: >-
      Tasks link through two doors: with binds values, after orders effects.
      The engine reads those bindings and builds the run graph В· nothing else
      creates an edge.
    sections:
      - { id: doors, anchor: doors, title: The two doors }
      - { id: edges, anchor: edges, title: Edge kinds }
      - { id: predicates, anchor: predicates, title: Gate predicates }
      - { id: waves, anchor: waves, title: Waves,
          note: "Kahn fronts В· max_parallel В· fail_fast" }
      - { id: decisions-slot, anchor: decisions, title: Decisions, slot: W-DEC }

  - id: acts
    title: The acts
    hub: /verbs
    hub_exists: true
    opener: >-
      A verb is a distinct native execution model: infer thinks, exec runs,
      invoke calls a tool, agent loops with judgment. The set is closed by
      design В· everything callable is a tool under invoke.

  - id: reach
    title: The reach
    hub: /tools
    hub_exists: true
    # reach is the one layer with sibling hubs В· /tools chains as primary
    sibling_hubs: [/providers, /templates]
    opener: >-
      Reach is what a workflow can touch: the standard library, the model
      providers, the routing skeletons. Every capability is named, cataloged
      and versioned В· nothing arrives by plugin.

  - id: boundary
    title: The boundary
    hub: /boundary
    hub_exists: true
    atlas_route: true
    opener: >-
      The file declares its blast radius. Permits allowlist what runs, reads,
      writes and calls В· secrets stay masked references. Absent means the
      engine floor, present means default-deny.
    sections:
      - { id: permits, anchor: permits, title: The permit families }
      - { id: secrets, anchor: secrets, title: Secrets }
      - { id: ssrf-floor, anchor: ssrf-floor, title: The always-on floor }

  - id: refusals
    title: The refusals
    hub: /errors
    hub_exists: true
    opener: >-
      Every refusal has a name. Errors are data: stable codes with a
      category, a transient flag and a documented fix shape В· never prose
      exceptions.
    sections:
      - { id: by-namespace, anchor: namespaces, title: By namespace }
      - { id: by-category, anchor: categories, title: By category }
      - { id: grammar, anchor: grammar, title: "The code grammar",
          note: "NIKA-<NS>-<NNN> В· four segments explained" }

  - id: proof
    title: The proof
    hub: /proof
    hub_exists: true
    atlas_route: true
    opener: >-
      A run you can verify, a graph you can read. The proof layer is how
      Nika shows its work: the run graph, the hash-chained trace, the
      conformance suite that re-proves every claim.
    sections:
      - { id: graph, anchor: graph, title: The run graph,
          note: "graph_format 2 В· the envelope В· additive law В· edge kinds project from /flow#edges" }
      - { id: receipt, anchor: receipt, title: The receipt, slot: W5,
          note: "NDJSON trace В· hash chain В· verify В· resume В· fills with the trace wave" }
      - { id: conformance, anchor: conformance, title: Conformance }
      - { id: machine, anchor: machine, title: Machine surfaces }

# в”Ђв”Ђв”Ђ the sets в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
