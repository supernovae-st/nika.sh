# ─── the library heroes (§2bis audit · VERDICT · WO-2b 2026-07-15) ──────────
# Two legal classes exist: re-vendored from spec (pinned) or crafted with the
# binary gate. A third class does not exist.
#
# AUDIT RECEIPTS (evidence at the binary + the test suite):
#  · all 7 are FLAGSHIPS: real recorded traces (src/flagships/traces ·
#    trace.test.ts honesty suite) + served copies byte-pinned to the rendered
#    module (served-library.test.ts) + registered sourceUrl (the source ↗ law).
#  · 5 of 7 share a showcase name upstream but the bodies DIVERGED on
#    purpose (recorded runs) · daily-brief and pr-risk-review have no
#    upstream twin → the vendored class is false for all 7.
#  · `nika check` at the RELEASED 0.103.0 refuses all 7 (NIKA-PARSE-019:
#    the W2 envelope's `workflow:` object vs the pre-W2 scalar) — the
#    binary-check leg of the crafted gate is RELEASE-GATED until the first
#    W2+ train · the schema gate (AJV, full file) holds today.
library_heroes_gates: "served byte-pin (served-library.test.ts) · recorded-trace honesty (trace.test.ts) · plan parity (library.test.ts) · schema AJV · binary check RELEASE-GATED (pre-W2 released binary refuses the W2 envelope)"
library_heroes:
  - { file: public/library/daily-brief.nika.yaml, class: crafted-room }
  - { file: public/library/etl-quarantine.nika.yaml, class: crafted-room }
  - { file: public/library/meeting-actions.nika.yaml, class: crafted-room }
  - { file: public/library/pr-risk-review.nika.yaml, class: crafted-room }
  - { file: public/library/price-watch.nika.yaml, class: crafted-room }
  - { file: public/library/social-repurpose.nika.yaml, class: crafted-room }
  - { file: public/library/standup-digest.nika.yaml, class: crafted-room }

# ─── the capture registry (§2bis · every terminal capture, its command,
# its gate) · all OLD-PIN captures (recorded at the displayed release ·
# version.test.ts pins the transcript surfaces to ENGINE_VERSION · the
# release cascade re-captures) · NEW captures stay release-gated (L5).
capture_registry:
  - { id: install-version, surface: src/content/install.ts, export: VERSION_TRANSCRIPT,
      command: "nika --version", gate: "version.test.ts pins to ENGINE_VERSION" }
  - { id: install-first-run, surface: src/content/install.ts, export: FIRST_RUN_TRANSCRIPT,
      command: "nika check hello.nika.yaml", gate: "version.test.ts pins to ENGINE_VERSION" }
  - { id: learn-full-file, surface: src/content/learn.ts, export: FULL_FILE_TRANSCRIPT,
      command: "nika check weekly-radar.nika.yaml", gate: "learn-fragments + version.test.ts" }
  - { id: home-run-explains, surface: src/flagships/flagship-data.ts, export: FLAGSHIPS,
      command: "nika run <flagship>.nika.yaml", gate: "trace.test.ts honesty suite (recorded traces)" }

# ─── the snippet registry (§2bis · the one gate-map of inline YAML) ──────────
# Every NON-generated source file that carries a `nika: v1` literal, each
# with the gate that already judges it. The no-floating-code lint refuses
# any file outside this registry (generated modules are the other legal
# home). Render-time enforcement (CodeFile/TermCapture require a ref)
# deploys at WO-4/5 — this registry is the compile-time porte.
snippet_registry:
  - { file: src/content/changelog.ts, kind: crafted-room, gate: "onpage-yaml AJV (full-file law)" }
  - { file: src/content/install.ts, kind: engine-capture, gate: "version.test.ts pins the transcript to ENGINE_VERSION" }
  - { file: src/content/learn.ts, kind: learn-fragment, gate: "learn-fragments.test.ts (FULL_FILE AJV)" }
  - { file: src/content/sitemap.ts, kind: crafted-room, gate: "onpage-yaml AJV", dies: wo-3 }
  - { file: src/flagships/flagship-data.ts, kind: library-hero, gate: "served byte-pin + recorded traces (see library_heroes_gates)" }
  - { file: src/pages/Convert.tsx, kind: crafted-room, gate: "convert PROOF export + AJV" }
  - { file: src/pages/NotFound.tsx, kind: crafted-room, gate: "the 404 file is a VALID workflow (the law has no exception)" }
  - { file: src/pages/Spec.tsx, kind: crafted-room, gate: "onpage-yaml AJV", note: "permanent · the page derives from canon (verdict 2026-07-16) · the sample rides the showcase island" }
  - { file: src/sections/EditorCanvas.tsx, kind: crafted-room, gate: "play lint (nika-lint.test.ts) + onpage-yaml" }
  - { file: src/sections/morph/plain-words.ts, kind: crafted-room, gate: "onpage-yaml AJV (the film corpus)" }
  - { file: src/sections/verbs-data.ts, kind: crafted-room, gate: "verb-cards embedding gate (fragment validated as written)" }

# ─── the design graph · fenêtre A (LENS_DESIGN_GRAPH §1 · law 1: a visual
#     fact has ONE place of declaration) ───────────────────────────────────────
# Verbs · severity · marks · accents live in the SPEC spine (design-tokens
# via nika-spec) — this section cites them BY NAME, never by value. A hex
# below is a SITE-side fact declared exactly once; build-atlas resolves and
# emits design.generated.css + design.generated.ts + design-palette.json,
# and the measured forks (og baker · constellation css · map surfaces)
# consume the emissions. Gate: src/test/design-graph.test.ts (fold law +
# css ratchet + cross-emission coherence) + atlas.test byte-diff.
design:
  paper:                 # the shared dark chrome (og cards · redirect stubs · svg)
    bg: "#0a0b0d"        # near-black card/stub ground (the og register)
    ink: "#f4f5f7"       # primary ink on paper
    dim: "#8a8f98"       # secondary ink · labels
    faint: "#6c727c"     # tertiary ink · captions
    bright: "#e8eefc"    # svg core + hover ink
    lab: "#aebad0"       # svg set labels
    agg: "#8fa0bd"       # svg +N aggregates
    wire: "#9db4e0"      # svg wires · rings
  layers:                # layer → SPINE token (the constellation mapping, promoted
    shape: markIce       # to the descriptor · render-constellation + map css +
    flow: infer          # the 3D scene all consume the SAME resolution)
    acts: agent
    reach: invoke
    boundary: exec
    refusals: fail
    proof: ok
  status:                # two-clocks · the systematic visual axis (law 2)
    ratified: stroke     # contour only · ratified, not yet shipped
    shipped: filled      # plain fill · shipped, not ratified
    both: filled-ring    # fill + ring · both clocks agree
  motion:                # tokens, never numbers (law 3) · surfaces adopt in B
    dur:                 # ms
      quick: 120
      soft: 240
      slow: 600
      film: 900
    ease:
      out: "cubic-bezier(0.215, 0.61, 0.355, 1)"
      snap: "linear(0, 0.402 22%, 0.782 40.1%, 0.99 55.8%, 1.037 69.9%, 1.021 82.6%, 1)"
      settle: "linear(0, 0.281 18.2%, 0.622 33.9%, 0.865 48.2%, 0.992 61.5%, 1.029 74.3%, 1.015 86.8%, 1)"
      linear: "linear"
  kinds:                 # fenetre C · famille → ref SPINE (jamais un hex) + glyphe
    #                       `sets:` = the twin sets this signature covers (the
    #                       readout resolves a member's kind THROUGH this · one
    #                       declaration, every surface)
    error:    { hue: fail,    glyph: "✗", sets: [error-codes, error-categories, error-namespaces] }
    tool:     { hue: invoke,  glyph: "◆", sets: [builtins, mcp-tools, tool-families] }
    word:     { hue: markIce, glyph: "·", sets: [words, truth-words] }
    template: { hue: infer,   glyph: "▤", sets: [templates] }
    showcase: { hue: agent,   glyph: "▶", sets: [showcases] }
    post:     { hue: accent,  glyph: "§", sets: [] }
  sota:                  # §7a ratifié · les valeurs des recherches R16-R19
    selection:           # per-verb-section · la couleur du verbe local à 35%
      mix_pct: 35
    focus:               # le ring qui claque
      ring_w: 2px
      ring_offset: 2px
    pressed:             # l'idiome terminal
      dur_ms: 90
      scale: 0.97
    phosphor:            # le geste terminal (Raycast sondé)
      tight: "0 0 2px"
      tight_pct: 60
      wide: "0 0 24px"
      wide_pct: 25
    elevation:           # le ladder = UNE déclaration (oklch relatif)
      base: "oklch(0.145 0.005 260)"
      step_l: 0.03
      steps: 3
    gamut:               # P3 step-up GÉNÉRÉ (jamais écrit deux fois)
      chroma_mul: 1.15
    grain:               # anti-banding (asset existant · l'opacité est le token)
      opacity: 0.03
