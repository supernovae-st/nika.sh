      category and a transient flag. If the engine can refuse it, the
      refusal has a name you can retry on, route on and search.

  - id: error-namespaces
    layer: refusals
    anchors_exist: false
    anchors_land: post-contract
    title: The error namespaces
    source: { artifact: public/errors/catalog.json, field: namespaces }
    clock: spec
    counted_in_canon: true
    closed: false
    surface: anchors
    anchor_page: /errors
    anchor_prefix: ns-
    defined_by: [spec/05-errors.md]
    # two truths, both rendered: the catalog DECLARES the namespaces (14
    # today, canon agrees) В· the codes WITNESS a subset (12 today: IMPL and
    # PROVIDER declare ranges but ship no codes yet). Declared-empty renders
    # honestly as such В· the census prints both figures.
    opener: >-
      Codes group by namespace, one per surface of the engine: parse, DAG,
      variables, security, each verb and the machine seams. A namespace can
      exist before its first code ships В· the register says so out loud.

  - id: error-categories
    layer: refusals
    anchors_exist: false
    anchors_land: post-contract
    title: The error categories
    source: { artifact: public/errors/catalog.json, field: categories }
    clock: spec
    counted_in_canon: true
    closed: false
    surface: anchors
    anchor_page: /errors
    anchor_prefix: cat-
    defined_by: [spec/05-errors.md]
    opener: >-
      A category names the kind of failure, orthogonal to the namespace
      that raised it. Transient categories are retry candidates В· the rest
      are contract refusals that no retry will fix.

  # в”Ђв”Ђ proof в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  - id: conformance-levels
    layer: proof
    anchors_exist: true
    title: The conformance levels
    source: { constants: true, mirrors: "spec/07-conformance.md В· three nested levels", revised_by: [W5, W6] }
    clock: spec
    counted_in_canon: false
    closed: true
    surface: anchors
    anchor_page: /proof
    anchor_section: conformance
    anchor_prefix: level-
    defined_by: [spec/07-conformance.md]
    opener: >-
      Conformance nests: core parses and validates, runtime executes, stdlib
      proves the library. A higher level includes every lower one В· the
      fixtures are the contract, not the prose.
    members:
      - { id: core, one_liner: "parse В· validate В· DAG В· variables В· typed errors В· no execution" }
      - { id: runtime, one_liner: "executes verbs В· evaluates when and for_each over run state" }
      - { id: stdlib, one_liner: "proves the v0.1 library surface В· the production default" }

  - id: mcp-tools
    layer: proof
    anchors_exist: true
    title: The oracle tools
    source: { artifact: src/canon.generated.ts, field: mcpToolNames }
    clock: spec
    counted_in_canon: true
    closed: false
    surface: anchors
    anchor_page: /proof
    anchor_section: machine
    anchor_prefix: mcp-
    defined_by: [canon.yaml]   # reference: the engine's MCP crate В· no spec chapter owns the oracle
    opener: >-
      The read-only oracle an agent loads: check, explain, schema, examples
      and the rest of the register. The same truth the CLI speaks, served
      over MCP В· nothing here mutates anything.

  - id: showcases
    layer: proof
    title: The showcases
    source: { artifact: src/sections/usecases-yaml.generated.ts, field: SHOWCASE_YAML, upstream: "nika-spec examples/showcase (conformance-gated В· manifest-hashed)" }
    clock: spec
    counted_in_canon: false
    closed: false
    surface: rooms
    rooms_url: /use-cases/:slug
    rooms_exist: true
    unique_data: "the ENTIRE workflow file + its projected DAG model + tier and persona + verbs and tools used (scan)"
    defined_by: [examples/manifest.yaml]
    evidence: { kind: conformance, ref: "showcase-projector.py --check В· every file passes the spec gate" }
    opener: >-
      Real workflows, whole files: each showcase passes the spec conformance
      gate and ships with its graph. This is the language at work on real
      jobs, not a demo reel.

  - id: truth-words
    layer: proof
    anchors_exist: true   # landed with /sources (WO-7) В· the waiver died with it
    title: The truth words
    source: { constants: true, mirrors: "mega-plan В§1bis В· the vocabulary of the truth", site_meta: true }
    clock: spec
    counted_in_canon: false
    closed: false
    surface: anchors
    anchor_page: /sources
    anchor_prefix: ""
    defined_by: [site:/sources]   # the one site-defined set В· it documents the machinery itself
    opener: >-
      The vocabulary of how this site tells the truth: spec, canon, schema,
      pack, pin, catalog, mirror, registry, manifest, atlas. Each word has
      exactly one meaning В· confusing two of them is a prose bug.
    members:
      - { id: spec, one_liner: "the nika-spec repo В· the truth of the language" }
      - { id: canon, one_liner: "canon.yaml В· the counted sets, spec-first" }
      - { id: schema, one_liner: "workflow.schema.json В· the shapes" }
      - { id: pack, one_liner: "the spec corpus vendored inside the engine" }
      - { id: pin, one_liner: "SPEC_PIN В· the exact spec sha the engine targets" }
      - { id: catalog, one_liner: "a machine projection the site serves В· byte-diffed in CI" }
      - { id: mirror, one_liner: "a byte-pinned copy, sha256-verified" }
      - { id: registry, one_liner: "nika-registry THE PRODUCT В· shared workflows, re-proven nightly" }
      - { id: manifest, one_liner: "the snippet lineage table В· every rendered block resolves here" }
