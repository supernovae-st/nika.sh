# в”Ђв”Ђв”Ђ the library heroes (В§2bis audit В· VERDICT В· WO-2b 2026-07-15) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Two legal classes exist: re-vendored from spec (pinned) or crafted with the
# binary gate. A third class does not exist.
#
# AUDIT RECEIPTS (evidence at the binary + the test suite):
#  В· all 7 are FLAGSHIPS: real recorded traces (src/flagships/traces В·
#    trace.test.ts honesty suite) + served copies byte-pinned to the rendered
#    module (served-library.test.ts) + registered sourceUrl (the source в†— law).
#  В· 5 of 7 share a showcase name upstream but the bodies DIVERGED on
#    purpose (recorded runs) В· daily-brief and pr-risk-review have no
#    upstream twin в†’ the vendored class is false for all 7.
#  В· `nika check` at the RELEASED 0.103.0 refuses all 7 (NIKA-PARSE-019:
#    the W2 envelope's `workflow:` object vs the pre-W2 scalar) вЂ” the
#    binary-check leg of the crafted gate is RELEASE-GATED until the first
#    W2+ train В· the schema gate (AJV, full file) holds today.
library_heroes_gates: "served byte-pin (served-library.test.ts) В· recorded-trace honesty (trace.test.ts) В· plan parity (library.test.ts) В· schema AJV В· binary check RELEASE-GATED (pre-W2 released binary refuses the W2 envelope)"
library_heroes:
  - { file: public/library/daily-brief.nika.yaml, class: crafted-room }
  - { file: public/library/etl-quarantine.nika.yaml, class: crafted-room }
  - { file: public/library/meeting-actions.nika.yaml, class: crafted-room }
  - { file: public/library/pr-risk-review.nika.yaml, class: crafted-room }
  - { file: public/library/price-watch.nika.yaml, class: crafted-room }
  - { file: public/library/social-repurpose.nika.yaml, class: crafted-room }
  - { file: public/library/standup-digest.nika.yaml, class: crafted-room }

# в”Ђв”Ђв”Ђ the capture registry (В§2bis В· every terminal capture, its command,
# its gate) В· all OLD-PIN captures (recorded at the displayed release В·
# version.test.ts pins the transcript surfaces to ENGINE_VERSION В· the
# release cascade re-captures) В· NEW captures stay release-gated (L5).
capture_registry:
  - { id: install-version, surface: src/content/install.ts, export: VERSION_TRANSCRIPT,
      command: "nika --version", gate: "version.test.ts pins to ENGINE_VERSION" }
  - { id: install-first-run, surface: src/content/install.ts, export: FIRST_RUN_TRANSCRIPT,
      command: "nika check hello.nika.yaml", gate: "version.test.ts pins to ENGINE_VERSION" }
  - { id: learn-full-file, surface: src/content/learn.ts, export: FULL_FILE_TRANSCRIPT,
      command: "nika check weekly-radar.nika.yaml", gate: "learn-fragments + version.test.ts" }
  - { id: home-run-explains, surface: src/flagships/flagship-data.ts, export: FLAGSHIPS,
      command: "nika run <flagship>.nika.yaml", gate: "trace.test.ts honesty suite (recorded traces)" }

# в”Ђв”Ђв”Ђ the snippet registry (В§2bis В· the one gate-map of inline YAML) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Every NON-generated source file that carries a `nika: v1` literal, each
# with the gate that already judges it. The no-floating-code lint refuses
# any file outside this registry (generated modules are the other legal
# home). Render-time enforcement (CodeFile/TermCapture require a ref)
# deploys at WO-4/5 вЂ” this registry is the compile-time porte.
snippet_registry:
  - { file: src/content/changelog.ts, kind: crafted-room, gate: "onpage-yaml AJV (full-file law)" }
  - { file: src/content/install.ts, kind: engine-capture, gate: "version.test.ts pins the transcript to ENGINE_VERSION" }
  - { file: src/content/learn.ts, kind: learn-fragment, gate: "learn-fragments.test.ts (FULL_FILE AJV)" }
  - { file: src/content/sitemap.ts, kind: crafted-room, gate: "onpage-yaml AJV", dies: wo-3 }
  - { file: src/flagships/flagship-data.ts, kind: library-hero, gate: "served byte-pin + recorded traces (see library_heroes_gates)" }
  - { file: src/pages/Convert.tsx, kind: crafted-room, gate: "convert PROOF export + AJV" }
  - { file: src/pages/NotFound.tsx, kind: crafted-room, gate: "the 404 file is a VALID workflow (the law has no exception)" }
  - { file: src/pages/Spec.tsx, kind: crafted-room, gate: "onpage-yaml AJV", note: "permanent В· the page derives from canon (verdict 2026-07-16) В· the sample rides the showcase island" }
  - { file: src/sections/EditorCanvas.tsx, kind: crafted-room, gate: "play lint (nika-lint.test.ts) + onpage-yaml" }
  - { file: src/sections/morph/plain-words.ts, kind: crafted-room, gate: "onpage-yaml AJV (the film corpus)" }
  - { file: src/sections/verbs-data.ts, kind: crafted-room, gate: "verb-cards embedding gate (fragment validated as written)" }
