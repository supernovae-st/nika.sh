#      agentes de ia 3600 BR / 900 ES · agent ia 7700 FR) — acts-node metas
#      should ride the local agent term, not a translated "workflow" phrase.
#   2. Practitioner terms often stay ENGLISH outside EN (workflow
#      orchestration 150/mo KR kd3 · 150 BR kd6 · 100 FR kd3) — where the
#      EN term beats the translation, the pick keeps EN (developers search
#      in English; the page chrome still speaks the locale).

