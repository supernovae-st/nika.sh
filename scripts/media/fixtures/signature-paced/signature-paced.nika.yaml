# yaml-language-server: $schema=https://nika.sh/spec/v1/workflow.schema.json
#
# SIGNATURE DEMO · paced variant — same release-notes pipeline, with a
# rate-limit pace (nika:wait) before each translate so the fanout takes
# real seconds: long enough to kill mid-flight and resume.
nika: v1
workflow:
  id: release-notes-i18n-paced
  description: "signature pipeline + per-locale pacing — the kill/resume demo subject"

model: mock/echo

vars:
  changes_dir: "./items"
  locales: ["fr-FR", "de-DE", "ja-JP", "es-ES"]

tasks:
  discover:
    invoke:
      tool: "nika:glob"
      args: { pattern: "${{ vars.changes_dir }}/*.md" }

  digest:
    after: { discover: success }
    exec:
      command: ["cat", "items/item-1.md", "items/item-2.md", "items/item-3.md", "items/item-4.md", "items/item-5.md"]

  stats:
    with:
      files: ${{ tasks.discover.output }}
    invoke:
      tool: "nika:jq"
      args:
        input: ${{ with.files }}
        expression: "{ files: length }"

  draft:
    with:
      digest: ${{ tasks.digest.output }}
    infer:
      max_tokens: 400
      prompt: |
        Draft concise release notes from these changes:
        ${{ with.digest }}

  pace:
    after: { draft: success }
    for_each: ${{ vars.locales }}
    max_parallel: 4
    invoke:
      tool: "nika:wait"
      args: { duration: "6s" }

  translate:
    after: { pace: success }
    with:
      draft: ${{ tasks.draft.output }}
    for_each: ${{ vars.locales }}
    max_parallel: 4
    infer:
      max_tokens: 400
      prompt: |
        Translate these release notes to ${{ item }}:
        ${{ with.draft }}

  survivors:
    with:
      translations: ${{ tasks.translate.output }}
    invoke:
      tool: "nika:jq"
      args:
        input: ${{ with.translations }}
        expression: "[ .[] | select(. != null) ]"

  publish:
    with:
      survivors: ${{ tasks.survivors.output }}
    when: ${{ with.survivors.size() > 0 }}
    exec:
      command: ["printf", "%s", "published: release notes ready"]

outputs:
  receipt: ${{ tasks.publish.output }}
