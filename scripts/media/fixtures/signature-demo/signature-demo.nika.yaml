# yaml-language-server: $schema=https://nika.sh/spec/v1/workflow.schema.json
#
# SIGNATURE DEMO · release-notes-i18n — the 60-second wow workflow.
# Deep chain × wide fanout · all four verbs (infer · exec · invoke · agent) ·
# CEL gate + jq fan-in · runs OFFLINE on mock/echo (zero key · zero network).
nika: v1
workflow:
  id: release-notes-i18n
  description: "digest local changes · draft release notes · translate ×4 locales · agent-verify · publish"

model: mock/echo

vars:
  changes_dir: "./items"
  locales: ["fr-FR", "de-DE", "ja-JP", "es-ES"]

tasks:
  discover:
    invoke:
      tool: "nika:glob"
      args: { pattern: "${{ vars.changes_dir }}/*.md" }

  digest:
    after: { discover: succeeded }
    exec:
      command: ["cat", "items/item-1.md", "items/item-2.md", "items/item-3.md", "items/item-4.md", "items/item-5.md"]

  stats:
    with:
      files: ${{ tasks.discover.output }}
    invoke:
      tool: "nika:jq"
      args:
        input: ${{ with.files }}
        expression: "{ files: length }"

  draft:
    with:
      digest: ${{ tasks.digest.output }}
    infer:
      max_tokens: 400
      prompt: |
        Draft concise release notes from these changes:
        ${{ with.digest }}

  translate:
    with:
      draft: ${{ tasks.draft.output }}
    for_each: ${{ vars.locales }}
    max_parallel: 4
    fail_fast: false
    timeout: "60s"
    retry:
      max_attempts: 2
      backoff_strategy: exponential
      jitter: true
    on_error:
      recover: null
    infer:
      max_tokens: 400
      prompt: |
        Translate these release notes to ${{ item }}:
        ${{ with.draft }}

  survivors:
    with:
      translations: ${{ tasks.translate.output }}
    invoke:
      tool: "nika:jq"
      args:
        input: ${{ with.translations }}
        expression: "[ .[] | select(. != null) ]"

  verify:
    with:
      survivors: ${{ tasks.survivors.output }}
    agent:
      max_tokens_total: 2000
      prompt: |
        Review these localized release notes for coverage and consistency.
        Reply APPROVED if every locale is present.
        ${{ with.survivors }}

  publish:
    after: { verify: succeeded }
    with:
      survivors: ${{ tasks.survivors.output }}
    when: ${{ with.survivors.size() > 0 }}
    exec:
      command: ["printf", "%s", "published: release notes ready"]

  report:
    with:
      files: ${{ tasks.stats.output }}
      receipt: ${{ tasks.publish.output }}
    infer:
      max_tokens: 120
      prompt: |
        One-line ship report for the team (files: ${{ with.files }}):
        ${{ with.receipt }}

outputs:
  notes: ${{ tasks.report.output }}
