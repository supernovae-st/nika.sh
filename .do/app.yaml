# DigitalOcean App Platform — nika.sh
#
# SOURCE OF TRUTH for the live app (name: nika · region: lon). Apply with:
#   doctl apps update 205698cb-6ca5-48ad-a614-7d15ff71de58 --spec .do/app.yaml
#
# 2026-06-10 · repointed from the legacy supernovae-ai/nika-landing (Nuxt)
# to THIS repo (supernovae-st/nika.sh · Vite v3 site). Conventions kept from
# the live spec Nicolas exported: app name, region, component name, alerts,
# ingress, buildpack feature.
#
# PREREQUISITE · the DigitalOcean GitHub App must have access to
# supernovae-st/nika.sh (github.com → Settings → Installations →
# DigitalOcean → grant the repo) BEFORE applying — otherwise the update
# is rejected with a repo-access error.
#
# docs.nika.sh is NOT served by this app — it is a Mintlify custom domain
# (CNAME in the nika.sh DO zone). See DEPLOY.md §5. Do not add it here.

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

domains:
  - domain: nika.sh
    type: PRIMARY
    zone: nika.sh
  - domain: www.nika.sh
    type: ALIAS
    zone: nika.sh

features:
  - buildpack-stack=ubuntu-22

ingress:
  rules:
    - component:
        name: nika-landing
      match:
        authority:
          exact: ""
        path:
          prefix: /

name: nika
region: lon

static_sites:
  - name: nika-landing
    github:
      repo: supernovae-st/nika.sh
      branch: main
      deploy_on_push: true
    source_dir: /
    environment_slug: node-js

    # pnpm via corepack (bundled in Node 22) · reproducible via lockfile
    build_command: corepack enable && pnpm install --frozen-lockfile && pnpm build
    output_dir: dist
    error_document: 404.html

    envs:
      - key: NODE_VERSION
        value: "22"
        scope: BUILD_TIME
