<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="robots" content="noindex" />
    <!--
      The human map moved: /map is the mother page (WO-3 · §0.12b), the
      crawler twin stays /sitemap.xml. Static + dependency-free (the /docs
      stub's exact pattern — a React stub here hydrated DURING its own meta
      refresh and threw #418): instant refresh, canonical at the real page
      so no engine indexes this shell. public/redirects.json carries the
      move as data (live: true) — the e2e replay judges it.
    -->
    <meta http-equiv="refresh" content="0; url=/map" />
    <link rel="canonical" href="https://nika.sh/map" />
    <title>The map · Nika</title>
    <meta name="theme-color" content="#0a0b0d" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        display: grid;
        place-items: center;
        min-height: 100svh;
        background: #0a0b0d;
        color: #f4f5f7;
        font:
          15px/1.6 ui-monospace,
          SFMono-Regular,
          Menlo,
          monospace;
      }
      a {
        color: #8db4ff;
      }
    </style>
  </head>
  <body>
    <p>→ <a href="/map">nika.sh/map</a></p>
  </body>
</html>
