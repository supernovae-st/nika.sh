<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="robots" content="noindex" />
    <!--
      Courtesy redirect: the docs live at docs.nika.sh (Mintlify), but
      nika.sh/docs is what people type. Static + dependency-free (this repo
      deploys as files — no server rules), instant meta refresh, canonical
      pointing at the real home so no engine indexes this shell.
    -->
    <meta http-equiv="refresh" content="0; url=https://docs.nika.sh" />
    <link rel="canonical" href="https://docs.nika.sh" />
    <title>Docs · Nika</title>
    <meta name="theme-color" content="#0a0b0d" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        display: grid;
        place-items: center;
        min-height: 100svh;
        background: #0a0b0d;
        color: #f4f5f7;
        font:
          15px/1.6 ui-monospace,
          SFMono-Regular,
          Menlo,
          monospace;
      }
      a {
        color: #8db4ff;
      }
    </style>
  </head>
  <body>
    <p>→ <a href="https://docs.nika.sh">docs.nika.sh</a></p>
  </body>
</html>
