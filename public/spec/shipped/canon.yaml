# ---------------------------------------------------------------- pillars
# 5 immutable pillars forever (spec/00-overview · the language backbone).
# Order is semantic · envelope frames · verbs act · dag composes · variables
# thread state · errors handle failure.
pillars:
  count: 5
  immutable: true
  reference: spec/00-overview.md
  items:
    - { order: 1, name: envelope,  semantic: "nika: v1 contract envelope (single-version marker · ADR-082)" }
    - { order: 2, name: verbs,     semantic: "the 4 native execution models" }
    - { order: 3, name: dag,       semantic: "task composition + control flow (for_each · when)" }
    - { order: 4, name: variables, semantic: "scope-bound state threading + binding (CEL + jq)" }
    - { order: 5, name: errors,    semantic: "the 15 error namespaces + handling contract" }

