# ------------------------------------------- outcome transitions (spec 13 · W5)
# THE normative (class × cause) table — machine-readable so the reference
# evaluator (outcome_core.py) and the engine (vendored pack) consume ONE
# source. Any pair outside this table is an engine bug, never a state.
outcome_transitions:
  trace_format: 2
  classes: [success, failure, skipped, cancelled]
  legal:
    success: [normal, recovered]
    failure: [verb_error, timeout, retry_exhausted]
    skipped: [gate, error_skip]
    cancelled: [upstream, operator, budget]
  payload:
    success: [value, attempts, "recovered_from?"]
    failure: [error, attempts]
    skipped: ["error?"]
    cancelled: [reason]

# ---------------------------------------------------------------- verbs
# D-2026-05-22-N18 · "the count is 4, absolute · immutable forever".
# A verb = a distinct native execution model · fetch is NOT a verb (it is the
# nika:fetch builtin reached via invoke:). spec/02-verbs.md is the prose home.
verbs:
  count: 4
  immutable: true
  reference: spec/02-verbs.md
  items:
    - { name: infer,  semantic: "LLM generation · structured output · vision · thinking" }
    - { name: exec,   semantic: "Shell command · blocklist · streaming" }
    - { name: invoke, semantic: "MCP tool call OR builtin (incl. nika:fetch)" }
    - { name: agent,  semantic: "Multi-turn agentic loop · tool calling · guardrails" }

