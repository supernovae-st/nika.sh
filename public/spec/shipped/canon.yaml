# ---------------------------------------------------------------- canonical phrasing
# F2 one-voice registry (2026-06-10 night arc · B1) · the LOAD-BEARING sentences
# that MUST read identically across spec · engine doc-comments · docs · website.
# Each entry · key + the canonical sentence (quote VERBATIM · never paraphrase in
# live canon prose) + the prose home. Sweep tooling matches on distinctive
# fragments (`match:`) · a live-canon surface contradicting a phrasing = drift.
# Historical/dated/archive surfaces exempt (leave-coupled-era prose).
canonical_phrasing:
  verb_definition:
    phrase: "A verb is a distinct native execution model"
    match: "distinct native execution model"
    home: spec/02-verbs.md
  callable_is_tool:
    phrase: "Everything callable is a tool reached through invoke: · everything about ordering is a DAG construct"
    match: "callable"
    home: spec/02-verbs.md
  fetch_not_a_verb:
    # home text · "so it is the `nika:fetch` builtin, reached through invoke:"
    phrase: "fetch is the `nika:fetch` builtin, reached through invoke: · not a verb"
    match: "`nika:fetch` builtin, reached"
    home: spec/02-verbs.md
  jq_one_data_language:
    phrase: "jq is the single data extraction-and-transform language"
    match: "extraction-and-transform"
    home: spec/04-variables.md
  provider_is_prefix:
    phrase: "You select an LLM with a single model: field · the provider is the prefix"
    match: "the provider is the prefix"
    home: stdlib/providers-v0.1.md
  envelope_forever:
    # home text · "names the language and pins the contract version"
    phrase: "nika: v1 names the language and pins the contract version · v1 is the only value for the lifetime of the v1 contract"
    match: "pins the contract version"
    home: spec/01-envelope.md
  edges_never_inferred:
    # home text · "the binding IS the edge · no invisible edges" (W2 · the
    # law inverted its mechanism, not its meaning: pre-W2 the edge had to be
    # restated in depends_on · since W2 the with:/after: declaration IS the
    # edge — either way, no edge exists that the source does not show)
    phrase: "the binding IS the edge — data and its dependency are one declaration · no invisible edges"
    match: "no invisible edges"
    home: spec/03-dag.md
  cel_not_a_dsl:
    phrase: "Nika does not invent an expression DSL · it adopts CEL"
    match: "invent an expression DSL"
    home: spec/03-dag.md
  spec_owns_errors:
    phrase: "the spec table · not any engine's source code · owns the taxonomy"
    match: "owns the taxonomy"
    home: spec/05-errors.md
  prose_wins:
    # home text · "(kept in sync · the prose is normative on conflict)"
    phrase: "the prose is normative on conflict · the published JSON Schema and the reference engine follow the spec"
    match: "the prose is normative on conflict"
    home: spec/07-conformance.md
