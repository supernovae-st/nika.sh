nika: v1
workflow:
  id: count-the-todos
  description: "recursive regex search — {path, line, match}, sorted"

tasks:
  todos:
    invoke:
      tool: "nika:grep"
      args:
        pattern: "TODO|FIXME"
        path: "./src"

  tally:
    with:
      todos: ${{ tasks.todos.output }}
    invoke:
      tool: "nika:jq"
      args:
        input: ${{ with.todos }}
        expression: "length"

outputs:
  count: ${{ tasks.tally.output }}
