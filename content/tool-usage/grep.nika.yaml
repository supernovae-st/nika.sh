nika: v1
workflow:
  id: count-the-todos
  description: "recursive regex search — {path, line, match}, sorted"

tasks:
  todos:
    invoke:
      tool: "nika:grep"
      args:
        pattern: "TODO|FIXME"
        path: "./src"

  lines:
    with:
      todos: ${{ tasks.todos.output }}
    invoke:
      tool: "nika:jq"
      args:
        input: ${{ with.todos }}
        expression: "map(.path) | join(\"\\n\")"

  tally:
    with:
      hits: ${{ tasks.lines.output }}
    exec:
      command: ["wc", "-l"]
      stdin: "${{ with.hits }}"

outputs:
  count: ${{ tasks.tally.output }}
