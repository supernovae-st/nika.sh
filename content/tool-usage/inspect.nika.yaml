nika: v1
workflow:
  id: watch-the-meter
  description: "the workflow looks at its own run — cost as data, mid-flight"

tasks:
  spend:
    invoke:
      tool: "nika:inspect"
      args: { view: cost }

  report:
    depends_on: [spend]
    invoke:
      tool: "nika:log"
      args:
        level: info
        message: "cost so far"
        data: ${{ tasks.spend.output }}
