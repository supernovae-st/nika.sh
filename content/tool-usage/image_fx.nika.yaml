nika: v1
workflow:
  id: poster-treatment
  description: "deterministic artistic ops over a png — seeded, replayable"

tasks:
  stylize:
    invoke:
      tool: "nika:image_fx"
      args:
        input: "./shots/hero.png"
        out: "./shots/hero-poster.png"
        ops:
          - duotone: {}
          - grain: {}
        seed: 7

outputs:
  poster: ${{ tasks.stylize.output }}
