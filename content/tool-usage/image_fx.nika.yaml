nika: v1
workflow:
  id: poster-treatment
  description: "deterministic artistic ops over a png — seeded, replayable"

tasks:
  stylize:
    invoke:
      tool: "nika:image_fx"
      args:
        input: "./shots/hero.png"
        out: "./shots/hero-poster.png"
        ops:
          - duotone: {}
          - grain: {}
        seed: 7

  review:
    with:
      poster: ${{ tasks.stylize.output }}
    infer:
      model: ollama/llama3.2-vision
      prompt: "Poster at ${{ with.poster }} — is the subject still legible after the treatment? One line."
      vision:
        - { source: file, path: "./shots/hero-poster.png" }
      thinking: { enabled: true, budget_tokens: 2000 }

outputs:
  poster: ${{ tasks.stylize.output }}
  verdict: ${{ tasks.review.output }}
