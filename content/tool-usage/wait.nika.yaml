nika: v1
workflow:
  id: let-the-index-settle
  description: "a declared pause — relative duration XOR absolute until"

tasks:
  publish:
    invoke:
      tool: "nika:notify"
      args:
        target: "https://hooks.example.com/deploys"
        message: "docs published"

  settle:
    depends_on: [publish]
    invoke:
      tool: "nika:wait"
      args: { duration: "30s" }

  verify:
    depends_on: [settle]
    invoke:
      tool: "nika:fetch"
      args:
        url: "https://docs.example.com/health"
        mode: jq
        jq: ".status"
