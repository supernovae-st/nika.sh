nika: v1
workflow:
  id: pin-the-artifact
  description: "content-address a file — the receipt survives the run"

env:
  LC_ALL: "C"

tasks:
  artifact:
    exec:
      shell: "cat report.md | tr -d '\r'"
      cwd: "./dist"

  pin:
    with:
      artifact: ${{ tasks.artifact.output }}
    invoke:
      tool: "nika:hash"
      args:
        content: "${{ with.artifact }}"
        algo: sha256

outputs:
  sha256: ${{ tasks.pin.output }}
