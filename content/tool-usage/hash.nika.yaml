nika: v1
workflow:
  id: pin-the-artifact
  description: "content-address a file — the receipt survives the run"

tasks:
  artifact:
    invoke:
      tool: "nika:read"
      args: { path: "./dist/report.md" }

  pin:
    depends_on: [artifact]
    invoke:
      tool: "nika:hash"
      args:
        content: "${{ tasks.artifact.output }}"
        algo: sha256

outputs:
  sha256: ${{ tasks.pin.output }}
