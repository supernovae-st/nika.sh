nika: v1
workflow:
  id: bump-log-level
  description: "literal find/replace in place — not regex, no surprises"

tasks:
  bump:
    invoke:
      tool: "nika:edit"
      args:
        path: "./config.toml"
        find: 'level = "info"'
        replace: 'level = "debug"'
        count: 1

outputs:
  changed: ${{ tasks.bump.output }}
