nika: v1
workflow:
  id: json-to-yaml
  description: "one format in, another out — identity is rejected"

tasks:
  translate:
    invoke:
      tool: "nika:convert"
      args:
        input: '{"name":"nika","verbs":4}'
        from: json
        to: yaml

outputs:
  yaml: ${{ tasks.translate.output }}
