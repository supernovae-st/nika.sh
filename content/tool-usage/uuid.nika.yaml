nika: v1
workflow: stamp-the-run
description: "a sortable v7 id — minted once, threaded through the file"

tasks:
  - id: mint
    invoke:
      tool: "nika:uuid"
      args: { version: v7 }

  - id: stamp
    depends_on: [mint]
    invoke:
      tool: "nika:write"
      args:
        path: "./run-id.txt"
        content: "${{ tasks.mint.output }}"

outputs:
  run_id: ${{ tasks.mint.output }}
