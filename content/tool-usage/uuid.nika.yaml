nika: v1
workflow:
  id: stamp-the-run
  description: "a sortable v7 id — minted once, threaded through the file"

tasks:
  mint:
    invoke:
      tool: "nika:uuid"
      args: { version: v7 }

  stamp:
    with:
      mint: ${{ tasks.mint.output }}
    invoke:
      tool: "nika:write"
      args:
        path: "./run-id.txt"
        content: "${{ with.mint }}"

outputs:
  run_id: ${{ tasks.mint.output }}
