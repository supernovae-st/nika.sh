# nika icon ontology · the SSOT for the functional icon system
#
# THIS FILE IS THE SOURCE. `design/build.mjs` projects it into:
#   public/brand/icons/<id>.svg   the served catalog (the SuperNovae house set)
#   public/brand/icons.json       the machine-readable ontology
#   public/brand/icons.ttl        the RDF projection (nika design namespace)
#   src/icons/manifest.ts         the site's typed icon manifest
# Drift is caught structurally: `pnpm check` runs `build.mjs --check`.
#
# GLYPH RESOLUTION:
#   supernovae:  the studio's own icon set (24-grid · stroke-2 · currentColor ·
#                operator-owned). Mapped glyphs are vendored under
#                design/svg/supernovae/<category>/<name>.svg; the private
#                master lives in the monorepo identity pole.
#   local:       house artwork drawn for the site itself (design/svg/ui ·
#                design/svg/social — the Nav 16px family + footer marks).
#
# INK LAW (BRAND.md): verb hues never appear in static UI — an entity renders
# with `inks.static` unless the surface is a LIVE RUN, where `hue` applies.
# Entity ids: <namespace>/<name> · namespaces: verb · builtin · feature ·
# state · ui · social. Builtin names MUST equal canon builtinNames (checked).

schema_version: 1

meta:
  name: nika-icon-library
  version: 1
  namespace: "https://nika.sh/ontology/design#"
  grid: 24
  set:
    id: supernovae
    name: "SuperNovae house icon set"
    home: "design/svg/supernovae/ (vendored) · private master in the studio identity pole"
  tokens_source: src/styles/tokens.css
  canon_source: src/canon.generated.ts

inks:
  static: { token: "--v4-text-dim", hex: "#8a8f98" }
  live: hue   # the entity's verb hue · live-run surfaces only

fx:
  run-glow: { css: "filter: drop-shadow(0 0 6px currentColor)", when: run-live }
  pulse: { css: "animation: nk-pulse 1.2s ease-in-out infinite", when: running }
  dim: { css: "opacity: 0.45", when: pending }

entities:
  # ── verbs · the 4 native execution models (canon: immutable forever) ──────
  verb/infer:
    label: Infer
    semantic: "LLM generation · structured output · vision · thinking"
    supernovae: ai-magic/sparkle
    hue: { token: "--verb-infer", hex: "#5b8cff" }
    fx: [run-glow]
    canon: spec/02-verbs.md
  verb/exec:
    label: Exec
    semantic: "Shell command · blocklist · streaming"
    supernovae: code/console
    hue: { token: "--verb-exec", hex: "#ff7a3c" }
    fx: [run-glow]
    canon: spec/02-verbs.md
  verb/invoke:
    label: Invoke
    semantic: "MCP tool call OR builtin (incl. nika:fetch)"
    supernovae: code/api-connection
    hue: { token: "--verb-invoke", hex: "#22d3ee" }
    fx: [run-glow]
    canon: spec/02-verbs.md
  verb/agent:
    label: Agent
    semantic: "Multi-turn agentic loop · tool calling · guardrails"
    supernovae: code/agent
    hue: { token: "--verb-agent", hex: "#b07bff" }
    fx: [run-glow]
    canon: spec/02-verbs.md

  # ── builtins · the 25 nika:* tools (parity-gated vs canon) ────────────────
  # Every builtin is reached through invoke: → parent verb/invoke; in a live
  # run it wears invoke's cyan; statically it wears the dim ink like all UI.
  builtin/assert:
    label: assert
    semantic: "Fail-fast guard: fail the task when condition is false"
    parent: verb/invoke
    supernovae: security/shield-2
    category: core
  builtin/compose:
    label: compose
    semantic: "Statically check a workflow draft — the check oracle inside agent loops"
    parent: verb/invoke
    shares_glyph_with: feature/check
    supernovae: security/shield-code
    category: introspection
  builtin/convert:
    label: convert
    semantic: "Convert between json · yaml · toml · csv"
    parent: verb/invoke
    supernovae: arrows/arrow-right-left
    category: data
  builtin/date:
    label: date
    semantic: "Timestamp arithmetic (now|add|subtract|format|parse|diff)"
    parent: verb/invoke
    supernovae: time-date/calendar-clock
    category: data
  builtin/done:
    label: done
    semantic: "The loop-completion sentinel (agent loops only)"
    parent: verb/invoke
    supernovae: things/racing-flag
    category: core
  builtin/edit:
    label: edit
    semantic: "In-place literal find/replace (not regex)"
    parent: verb/invoke
    supernovae: folders-files/page-edit
    category: file
  builtin/emit:
    label: emit
    semantic: "Emit a custom machine event for subscribers/journal"
    parent: verb/invoke
    supernovae: devices-signals/signal-tower
    category: core
  builtin/fetch:
    label: fetch
    semantic: "HTTP request + content extraction · SSRF-defended"
    parent: verb/invoke
    supernovae: location/globe
    category: network
  builtin/glob:
    label: glob
    semantic: "Glob match · paths sorted lexicographically"
    parent: verb/invoke
    supernovae: security/asterisk
    category: file
  builtin/grep:
    label: grep
    semantic: "Recursive regex search over files"
    parent: verb/invoke
    supernovae: folders-files/page-search-lines
    category: file
  builtin/hash:
    label: hash
    semantic: "Content hashing · blake3 | sha256 | sha512"
    parent: verb/invoke
    supernovae: security/finger-print-1
    category: data
  builtin/image_generate:
    label: image_generate
    semantic: "Generate image assets — files land on disk, never inline"
    parent: verb/invoke
    supernovae: ai-magic/image-sparkle
    category: media
  builtin/inspect:
    label: inspect
    semantic: "Introspect the running workflow (cost | records | dag_info | threads)"
    parent: verb/invoke
    supernovae: interface-general/deep-search
    category: introspection
  builtin/jq:
    label: jq
    semantic: "THE data-transform language · emits exactly one value"
    parent: verb/invoke
    supernovae: filter-settings/filter-1
    category: data
  builtin/json_diff:
    label: json_diff
    semantic: "JSON diff · returns an RFC 6902 JSON Patch"
    parent: verb/invoke
    supernovae: code/difference-modified
    category: data
  builtin/json_merge_patch:
    label: json_merge_patch
    semantic: "RFC 7396 merge patch (null deletes a key)"
    parent: verb/invoke
    supernovae: code/merged
    category: data
  builtin/log:
    label: log
    semantic: "Human-readable diagnostic line to the run stream"
    parent: verb/invoke
    supernovae: folders-files/script
    category: core
  builtin/notify:
    label: notify
    semantic: "Send a notification (webhook channel in v0.1)"
    parent: verb/invoke
    supernovae: interface-general/bell
    category: network
  builtin/prompt:
    label: prompt
    semantic: "Ask a HUMAN (confirm | input | choice) · blocks until answered"
    parent: verb/invoke
    supernovae: communication/bubble-question
    category: core
  builtin/read:
    label: read
    semantic: "Read a file · text or opaque bytes"
    parent: verb/invoke
    supernovae: folders-files/page-text
    category: file
  builtin/tts_generate:
    label: tts_generate
    semantic: "Synthesize speech audio · sovereign-first providers"
    parent: verb/invoke
    supernovae: ai-magic/text-to-speach
    category: media
  builtin/uuid:
    label: uuid
    semantic: "Generate a UUID · v7 sortable (default) or v4"
    parent: verb/invoke
    supernovae: interface-general/barcode
    category: data
  builtin/validate:
    label: validate
    semantic: "Validate data against a JSON Schema · a report, not a failure"
    parent: verb/invoke
    supernovae: interface-general/checklist
    category: data
  builtin/wait:
    label: wait
    semantic: "Pause · relative duration XOR absolute until"
    parent: verb/invoke
    supernovae: time-date/hourglass
    category: core
  builtin/write:
    label: write
    semantic: "Write a file · returns the path"
    parent: verb/invoke
    supernovae: folders-files/page-add
    category: file

  # ── features · the product surfaces (editor · CLI · site) ────────────────
  feature/check:
    label: Check
    semantic: "The static audit — conformance · secret-flow · permits · cost, before any token"
    supernovae: security/shield-code
    hue: { token: "--v4-accent", hex: "#4f86ff" }
  feature/run:
    label: Run
    semantic: "Execute the workflow (mock needs no key)"
    supernovae: sound-music/play
  feature/dry-run:
    label: Dry-run
    semantic: "Show the plan · zero effects"
    supernovae: interface-general/circle-dashed
  feature/preflight:
    label: Preflight
    semantic: "The flight plan before any token: models · secrets · permits · cost"
    supernovae: vehicles-aircrafts/airplane-up
  feature/dag:
    label: DAG
    semantic: "The content-first canvas — tasks and the wires between them"
    supernovae: code/code-tree
  feature/trace:
    label: Trace
    semantic: "The flight recorder — every run journaled, replayable"
    supernovae: time-date/history
  feature/replay:
    label: Replay
    semantic: "Time travel over a recorded run — never re-executes"
    supernovae: sound-music/replay
  feature/diff-runs:
    label: Diff runs
    semantic: "Two runs compared on the DAG"
    shares_glyph_with: builtin/json_diff
    supernovae: code/difference-modified
  feature/permits:
    label: Permits
    semantic: "The capability boundary — default-deny once declared"
    supernovae: security/shield-access
  feature/secrets:
    label: Secrets
    semantic: "Store references only — literals never enter the file"
    supernovae: security/key-1
  feature/cost:
    label: Cost
    semantic: "The static cost interval + the ceiling, priced before running"
    supernovae: shopping-payment/receipt-bill
  feature/doctor:
    label: Doctor
    semantic: "Diagnose the environment · ping local providers"
    supernovae: interface-general/electrocardiogram
  feature/fork:
    label: Fork from task
    semantic: "Re-execute downstream · upstream rehydrates from the trace"
    supernovae: code/fork-simple
  feature/reproduce:
    label: Reproduce
    semantic: "Determinism check — classifies WHY two runs diverge"
    supernovae: arrows/arrows-repeat
  feature/verify-chain:
    label: Verify chain
    semantic: "Tamper-evidence — the journal hash-chains itself"
    supernovae: interface-general/chain-link-1
  feature/export-otel:
    label: Export OTel
    semantic: "Ship the trace to Jaeger · Grafana · Langfuse"
    supernovae: interface-general/arrow-out-of-box
  feature/report:
    label: Run report
    semantic: "Provable — read from the trace, states its own integrity"
    supernovae: folders-files/file-chart
  feature/history:
    label: Run history
    semantic: "Cross-run grid · flaky · trends"
    supernovae: statistics-charts/leaderboard
  feature/generate:
    label: Generate
    semantic: "Describe → generate a workflow (oracle-checked)"
    supernovae: ai-magic/magic-wand
  feature/explain:
    label: Explain
    semantic: "The engine narrates the workflow · deterministic · offline"
    supernovae: communication/book-simple
  feature/examples:
    label: Examples
    semantic: "The embedded example pack"
    supernovae: folders-files/library
  feature/schema:
    label: Schema
    semantic: "The published JSON Schema — completions read the engine's own"
    supernovae: code/brackets-1
  feature/mcp:
    label: MCP
    semantic: "The read-only oracle surface (8 tools)"
    shares_glyph_with: verb/invoke
    supernovae: code/api-connection
  feature/lsp:
    label: LSP
    semantic: "The language server — one brain, every editor"
    supernovae: code/code-assistant

  # ── states · the run/trace fold (surface-defined colors · no site tokens) ─
  state/running:
    label: Running
    semantic: "A task is live"
    supernovae: interface-general/loading-circle
    fx: [pulse]
  state/success:
    label: Success
    semantic: "Settled clean"
    supernovae: interface-general/circle-check
  state/failed:
    label: Failed
    semantic: "Settled failed"
    supernovae: interface-general/circle-x
  state/recovered:
    label: Recovered
    semantic: "A repaired success — it keeps its ✓ but says so"
    supernovae: interface-general/heart-beat
  state/skipped:
    label: Skipped
    semantic: "A when: gate held it back"
    supernovae: interface-general/circle-minus
  state/pending:
    label: Pending
    semantic: "Waiting on upstream"
    shares_glyph_with: feature/dry-run
    supernovae: interface-general/circle-dashed
    fx: [dim]
  state/cancelled:
    label: Cancelled
    semantic: "The failure gate or the user stopped it"
    supernovae: interface-general/circle-ban-sign

  # ── ui · the site's hand-drawn 16px family (house artwork · absorbed) ─────
  # Source files: design/svg/ui/*.svg (stroke 1.5 · 16-grid · ours).
  ui/run: { label: See it run, local: ui/run, grid: 16 }
  ui/verbs: { label: The four verbs, local: ui/verbs, grid: 16 }
  ui/shield: { label: What it can touch, local: ui/shield, grid: 16 }
  ui/tiles: { label: Use cases, local: ui/tiles, grid: 16 }
  ui/terminal: { label: Playground, local: ui/terminal, grid: 16 }
  ui/book: { label: Learn, local: ui/book, grid: 16 }
  ui/butterfly: { label: Manifesto, local: ui/butterfly, grid: 16, note: "nav stroke-family artwork (kit nika-glyph-16) — NEVER the logo: logo surfaces carry the real mark (operator lock 2026-07-09)" }

  # ── social · the footer marks (house tracings · absorbed from the sprite) ─
  # public/icons.svg stays byte-frozen this cycle (visual goldens); these are
  # the normalized currentColor library versions for future surfaces.
  social/bluesky: { label: Bluesky, local: social/bluesky, mode: fill }
  social/discord: { label: Discord, local: social/discord, mode: fill }
  social/github: { label: GitHub, local: social/github, mode: fill }
  social/x: { label: X, local: social/x, mode: fill }
  social/documentation: { label: Documentation, local: social/documentation, mode: stroke, stroke_width: 1.35, legacy_ink: "#aa3bff" }
  social/community: { label: Community, local: social/community, mode: stroke, stroke_width: 1.35, legacy_ink: "#aa3bff" }

  # ── anim · the dot-matrix motion language (patterns ARE the semantics) ────
  # 9×9 grid figures rendered by src/fx/dotmatrix (NikaDots). Each verb's
  # pattern is its execution model — not decoration. `alternate` figures play
  # forward then back (request/response · wing-beat). Hue rides the parent
  # verb and speaks only on live surfaces (ink law).
  anim/infer:
    label: Infer · sampling
    semantic: "the model samples — the sparkle figure emerges from seeded noise"
    pattern: sample
    parent: verb/infer
    fx: [run-glow]
  anim/exec:
    label: Exec · scanline
    semantic: "stdout marches — rows light top to bottom, carriage-return quick"
    pattern: scanline
    parent: verb/exec
    fx: [run-glow]
  anim/invoke:
    label: Invoke · roundtrip
    semantic: "request/response — a radial pulse leaves the center and comes back"
    pattern: roundtrip
    alternate: true
    parent: verb/invoke
    fx: [run-glow]
  anim/agent:
    label: Agent · orbit
    semantic: "the bounded loop — a tail orbits the perimeter, the core ticks each lap"
    pattern: orbit
    parent: verb/agent
    fx: [run-glow]
  anim/butterfly:
    label: The butterfly beats
    semantic: "the brand mark in dots — wings unfold from the body and fold back"
    pattern: emerge
    alternate: true
  anim/loading:
    label: Loading · wave
    semantic: "the neutral register — a diagonal wave"
    pattern: wave
