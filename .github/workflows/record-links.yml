name: record-links

# The manifesto record's law, enforced: every entry carries a primary
# source and that source must answer. Probes weekly (link rot is slow)
# and on any PR that touches the record. Dependency-free script — no
# install step needed. 404/DNS/5xx fail; bot walls are tolerated.
# No untrusted event input is interpolated anywhere in this workflow.

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  pull_request:
    paths:
      - 'src/content/manifesto-record.ts'
      - 'scripts/check-record-links.mjs'
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false  # v5 default reads packageManager and wants pnpm pre-installed; corepack runs after — keep v4 behavior
      - name: probe every record source
        run: node scripts/check-record-links.mjs
