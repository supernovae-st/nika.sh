name: spec-resync

# The generated-surface drift class dies the way the hand-bump class
# did (release-heal): today's catch was manual — the spec's template
# diet reshaped all 10 skeletons and /templates served the stale
# bytes for a day; the SSOT consolidation added NIKA_PROVIDERS_ORDER
# and the website design projection was never re-run. This cron
# re-derives every spec-fed surface from a fresh spec clone and, on
# drift, opens ONE idempotent PR — the visual gates stay in the loop
# (never a direct push: generated bytes repaint real pages).
#
# SECURITY: no github.event data reaches the shell.
#
# LENS-011 (PRE1 · design-pack contract): every leg is normative —
# a failed generator PROPAGATES (the old `|| true` swallowed it and a
# PARTIAL derivation could ship into the proposal PR); the checkout is
# EXPLICIT and both source identities (website sha · spec sha) are
# RECORDED into the commit and PR body; the bot branch advance is
# serialized by a concurrency group and pushed with --force-with-lease
# after an explicit fetch (a foreign write to the bot branch fails the
# push instead of being clobbered); PR creation never swallows stderr —
# the already-open case is detected by QUERY, not by masking failures.

on:
  schedule:
    - cron: '41 6 * * *' # daily · after the engine nightly + heal window
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: spec-resync-bot-branch
  cancel-in-progress: false # two writers on bot/spec-resync must serialize, never race

jobs:
  resync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main # LENS-011: the resynced surface is MAIN, explicitly — never the event's implicit default
          fetch-depth: 1
      - name: Fetch the spec SSOT (sibling layout) and RECORD both identities
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/supernovae-st/nika-spec ../spec
          echo "WEBSITE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "SPEC_SHA=$(git -C ../spec rev-parse HEAD)" >> "$GITHUB_ENV"
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false  # v5 default reads packageManager and wants pnpm pre-installed; corepack runs after — keep v4 behavior
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Re-derive every spec-fed surface (every leg NORMATIVE — failures propagate)
        env:
          NIKA_SPEC_ROOT: ${{ github.workspace }}/../spec
          NIKA_WEBSITE_SRC: ${{ github.workspace }}/src
        run: |
          set -euo pipefail
          pip install pyyaml
          node scripts/build-templates.mjs
          node scripts/build-tool-usage.mjs
          node scripts/build-language-usage.mjs
          node scripts/vendor-lint-fixtures.mjs   # the port's conformance corpus follows the spec
          node scripts/vendor-gate-matrix.mjs     # the gate explorable's 40 cells follow too
          # LENS-011: an ABSENT leg skips by DECLARED condition; a PRESENT leg that
          # fails PROPAGATES — the old `|| true` let a broken projector ship a
          # partial derivation into the proposal PR.
          if [ -f ../spec/scripts/design-projector.py ]; then
            python3 ../spec/scripts/design-projector.py --write
          else
            echo "design-projector.py absent from the spec at ${SPEC_SHA} — leg skipped by declared condition"
          fi
      - name: One idempotent PR on drift (no swallowed failures · no partial publish)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git add -A
          if git diff --cached --quiet; then
            echo "every spec-fed surface already current — nothing to resync"
            exit 0
          fi
          git config user.name "nika-release[bot]"
          git config user.email "nika@supernovae.studio"
          git checkout -B bot/spec-resync
          git commit -m "chore(spec-resync): the generated surfaces follow the pack" \
            -m "provenance: website ${WEBSITE_SHA} + spec ${SPEC_SHA} — every generator leg green (a failed leg aborts this run before anything is pushed)."
          # LENS-011: advance the bot branch with a LEASE — an unexpected foreign
          # write to bot/spec-resync fails the push loudly instead of being clobbered.
          # (explicit refspec: the narrowed checkout fetch config would not update the
          #  remote-tracking ref the lease compares against)
          if git fetch origin +refs/heads/bot/spec-resync:refs/remotes/origin/bot/spec-resync; then
            git push --force-with-lease=refs/heads/bot/spec-resync origin bot/spec-resync
          else
            echo "bot/spec-resync absent on origin — first publication (a create race fails non-fast-forward, never clobbers)"
            git push origin bot/spec-resync
          fi
          # LENS-011: idempotence by QUERY — never by masking create failures.
          open_pr="$(gh pr list --head bot/spec-resync --state open --json number --jq 'length')"
          if [ "${open_pr}" = "0" ]; then
            gh pr create --head bot/spec-resync \
              --title "chore(spec-resync): the generated surfaces follow the pack" \
              --body "Automated re-derivation. Provenance: website ${WEBSITE_SHA} · spec ${SPEC_SHA}. Every generator leg green (templates · tool-usage · language-usage · lint-fixtures · gate-matrix · design projection); a failed leg aborts the run before any push. The visual gates judge; merge on green."
          else
            echo "PR already open for bot/spec-resync — the lease-guarded push refreshed it"
          fi
