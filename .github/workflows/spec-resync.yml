name: spec-resync

# The generated-surface drift class dies the way the hand-bump class
# did (release-heal): today's catch was manual — the spec's template
# diet reshaped all 10 skeletons and /templates served the stale
# bytes for a day; the SSOT consolidation added NIKA_PROVIDERS_ORDER
# and the website design projection was never re-run. This cron
# re-derives every spec-fed surface from a PINNED spec and, on drift,
# opens ONE idempotent PR — the visual gates stay in the loop (never a
# direct push: generated bytes repaint real pages).
#
# SECURITY: no github.event data reaches the shell (schedule + manual
# dispatch only; the spec identity comes from a committed pin file).
#
# LENS-011 (PRE1 · design-pack contract · lot 9i — four preconditions,
# each fail-closed):
#   (1) PINNED spec — .github/nika-spec-pin.json carries the exact spec
#       commit; the spec is fetched BY SHA, never a moving ref/HEAD.
#   (2) DIGEST VERIFY BEFORE anything is derived — the fetched spec's
#       HEAD and HEAD^{tree} must equal the pin; a mismatch aborts the
#       run before a single generator leg (or commit, or push, or PR).
#   (3) UNIQUE branch — bot/spec-resync/<spec-sha> is unique to the pin;
#       never a reused stable branch.
#   (4) PLAIN CREATE push — no --force, no --force-with-lease anywhere;
#       idempotence is decided by QUERY (a PR already open for this pin
#       => exit clean), and a create race fails non-fast-forward loudly.
#   Every generator leg is normative — a failure PROPAGATES (no `|| true`),
#   so a partially derived proposal PR is impossible.

on:
  schedule:
    - cron: '41 6 * * *' # daily · after the engine nightly + heal window
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: spec-resync
  cancel-in-progress: false

jobs:
  # (4·tests) The workflow self-gates: the conformance verifier proves the four
  # LENS-011 preconditions on THIS file + the pin before any resync work runs.
  verify-conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 1
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Verify spec-resync conformance (LENS-011 four preconditions)
        run: python3 scripts/verify_spec_resync_conformance.py

  resync:
    needs: verify-conformance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main # the resynced surface is MAIN, explicitly — never the event's implicit default
          fetch-depth: 1
      - name: Read the PINNED spec identity and fetch it BY SHA
        run: |
          set -euo pipefail
          pin=".github/nika-spec-pin.json"
          SPEC_REPO="$(python3 -c 'import json;print(json.load(open("'"$pin"'"))["repository"])')"
          SPEC_COMMIT="$(python3 -c 'import json;print(json.load(open("'"$pin"'"))["spec_commit"])')"
          SPEC_TREE="$(python3 -c 'import json;print(json.load(open("'"$pin"'"))["spec_tree"])')"
          echo "WEBSITE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "SPEC_COMMIT=${SPEC_COMMIT}" >> "$GITHUB_ENV"
          echo "SPEC_TREE=${SPEC_TREE}" >> "$GITHUB_ENV"
          # fetch the EXACT pinned commit — never a branch, never HEAD
          git init ../spec
          git -C ../spec fetch --depth 1 "https://github.com/${SPEC_REPO}" "${SPEC_COMMIT}"
          git -C ../spec checkout --detach "${SPEC_COMMIT}"
      - name: DIGEST VERIFY the pinned spec BEFORE any derivation (fail-closed)
        run: |
          set -euo pipefail
          got_commit="$(git -C ../spec rev-parse HEAD)"
          got_tree="$(git -C ../spec rev-parse 'HEAD^{tree}')"
          if [ "${got_commit}" != "${SPEC_COMMIT}" ]; then
            echo "spec commit mismatch: fetched ${got_commit} != pinned ${SPEC_COMMIT}" >&2
            exit 1
          fi
          if [ "${got_tree}" != "${SPEC_TREE}" ]; then
            echo "spec TREE (content digest) mismatch: fetched ${got_tree} != pinned ${SPEC_TREE}" >&2
            exit 1
          fi
          echo "pinned spec verified: commit ${SPEC_COMMIT} tree ${SPEC_TREE}"
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Re-derive every spec-fed surface (every leg NORMATIVE — failures propagate)
        env:
          NIKA_SPEC_ROOT: ${{ github.workspace }}/../spec
          NIKA_WEBSITE_SRC: ${{ github.workspace }}/src
        run: |
          set -euo pipefail
          pip install pyyaml
          node scripts/build-templates.mjs
          node scripts/build-tool-usage.mjs
          node scripts/build-language-usage.mjs
          node scripts/vendor-lint-fixtures.mjs   # the port's conformance corpus follows the spec
          node scripts/vendor-gate-matrix.mjs      # the gate explorable's 40 cells follow too
          # an ABSENT leg skips by DECLARED file-existence condition; a PRESENT leg
          # that fails PROPAGATES — no `|| true` ever swallows a normative failure.
          if [ -f ../spec/scripts/design-projector.py ]; then
            python3 ../spec/scripts/design-projector.py --write
          else
            echo "design-projector.py absent from the spec at ${SPEC_COMMIT} — leg skipped by declared condition"
          fi
      - name: One idempotent PR on drift — UNIQUE branch, PLAIN create, no force
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git add -A
          if git diff --cached --quiet; then
            echo "every spec-fed surface already current at the pinned spec — nothing to resync"
            exit 0
          fi
          branch="bot/spec-resync/${SPEC_COMMIT}"
          # idempotence by QUERY: if a PR for THIS pin is already open, the proposal
          # exists — exit clean, never re-push, never force.
          open_pr="$(gh pr list --head "${branch}" --state open --json number --jq 'length')"
          if [ "${open_pr}" != "0" ]; then
            echo "a resync PR for pinned spec ${SPEC_COMMIT} is already open (${branch}) — nothing to do"
            exit 0
          fi
          git config user.name "nika-release[bot]"
          git config user.email "nika@supernovae.studio"
          git checkout -b "${branch}"
          git commit -m "chore(spec-resync): the generated surfaces follow the pinned spec" \
            -m "provenance: website ${WEBSITE_SHA} + spec ${SPEC_COMMIT} (tree ${SPEC_TREE}) — pinned + digest-verified before derivation; every generator leg green (a failed leg aborts this run before anything is pushed)."
          # PLAIN CREATE — the branch is unique to this pin, so there is nothing to
          # clobber; a create race on the same name fails non-fast-forward, loudly.
          git push origin "${branch}"
          gh pr create --head "${branch}" \
            --title "chore(spec-resync): the generated surfaces follow the pinned spec" \
            --body "Automated re-derivation at PINNED spec ${SPEC_COMMIT} (tree ${SPEC_TREE}), digest-verified before any generator ran. Provenance: website ${WEBSITE_SHA}. Every generator leg green (templates, tool-usage, language-usage, lint-fixtures, gate-matrix, design projection); a failed leg aborts the run before any push. The visual gates judge; merge on green."
