name: spec-resync

# The generated-surface drift class dies the way the hand-bump class
# did (release-heal): today's catch was manual — the spec's template
# diet reshaped all 10 skeletons and /templates served the stale
# bytes for a day; the SSOT consolidation added NIKA_PROVIDERS_ORDER
# and the website design projection was never re-run. This cron
# re-derives every spec-fed surface from a fresh spec clone and, on
# drift, opens ONE idempotent PR — the visual gates stay in the loop
# (never a direct push: generated bytes repaint real pages).
#
# SECURITY: no github.event data reaches the shell.

on:
  schedule:
    - cron: '41 6 * * *' # daily · after the engine nightly + heal window
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  resync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Fetch the spec SSOT (sibling layout)
        run: git clone --depth 1 https://github.com/supernovae-st/nika-spec ../spec
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Re-derive every spec-fed surface
        env:
          NIKA_SPEC_ROOT: ${{ github.workspace }}/../spec
          NIKA_WEBSITE_SRC: ${{ github.workspace }}/src
        run: |
          set -euo pipefail
          pip install pyyaml
          node scripts/build-templates.mjs
          node scripts/build-tool-usage.mjs
          node scripts/build-language-usage.mjs
          python3 ../spec/scripts/design-projector.py --write || true # absent legs skip; the diff judges
      - name: One idempotent PR on drift
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git add -A
          if git diff --cached --quiet; then
            echo "every spec-fed surface already current — nothing to resync"
            exit 0
          fi
          git config user.name "nika-release[bot]"
          git config user.email "nika@supernovae.studio"
          git checkout -B bot/spec-resync
          git commit -m "chore(spec-resync): the generated surfaces follow the pack"
          git push -f origin bot/spec-resync
          gh pr create --head bot/spec-resync \
            --title "chore(spec-resync): the generated surfaces follow the pack" \
            --body "Automated re-derivation from today's nika-spec (templates catalog · tool-usage · language-usage · design tokens). The visual gates judge; merge on green." \
            2>/dev/null || echo "PR already open — force-pushed the refresh"
