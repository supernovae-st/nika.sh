name: release-heal

# The hand-bump class dies: the hero plate said v0.99.0 while the
# published release was v0.101.0 — two waves of silent drift the nightly
# coherence bot could only WARN about. This cron asks the public release
# API and, on drift, rewrites the ONE constant (src/content.ts
# ENGINE_VERSION) and pushes. Self-heal on self, GITHUB_TOKEN only —
# the engine's changelog-cliff pattern.
#
# SECURITY: no github.event data reaches the shell; the only external
# value is the release tag, validated against ^v[0-9.]+$ before use.

on:
  schedule:
    - cron: '23 6 * * *' # daily · after the engine's nightly window
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  heal:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - name: Every carrier follows the release — honestly
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="$(gh release view --repo supernovae-st/nika --json tagName --jq .tagName)"
          [[ "$tag" =~ ^v[0-9][0-9.]*$ ]] || { echo "::error::unexpected tag shape: $tag"; exit 1; }
          current="$(sed -n "s/.*ENGINE_VERSION = '\([^']*\)'.*/\1/p" src/content.ts | head -1)"
          if [ "$current" = "$tag" ]; then
            echo "carriers already at $tag — nothing to heal"
            exit 0
          fi
          # The honesty law: the install transcript claims what `nika
          # --version` answers — so CAPTURE it from the released binary
          # (checksum-verified), never fabricate the string.
          ver="${tag#v}"
          curl -fsSLO "https://github.com/supernovae-st/nika/releases/download/${tag}/SHA256SUMS"
          curl -fsSLO "https://github.com/supernovae-st/nika/releases/download/${tag}/nika-linux-x64-${ver}.tar.gz"
          grep "nika-linux-x64-${ver}.tar.gz" SHA256SUMS | sha256sum -c -
          tar xzf "nika-linux-x64-${ver}.tar.gz" nika
          captured="$(./nika --version)"
          rm -f nika "nika-linux-x64-${ver}.tar.gz" SHA256SUMS
          # ONE rewrite lane (scripts/sync-version.mjs) — version.test.ts
          # judges the PR: a half-heal stays red on the branch, main
          # never breaks (the 2026-07-13 half-heal lesson, structural).
          node scripts/sync-version.mjs "$tag" --transcript "$captured"
          git add -A
          git diff --cached --quiet && { echo "no diff after sync — done"; exit 0; }
          git config user.name "nika-release[bot]"
          git config user.email "nika@supernovae.studio"
          git checkout -B bot/release-heal
          git commit -m "chore(version): every carrier follows $tag — transcript captured from the released binary"
          git push -f origin bot/release-heal
          gh pr create --head bot/release-heal \
            --title "chore(version): every carrier follows $tag" \
            --body "Automated heal (ONE lane: sync-version.mjs · transcript CAPTURED from the checksum-verified release binary: \`$captured\`). version-truth judges; merge on green." \
            2>/dev/null || echo "PR already open — refreshed"
