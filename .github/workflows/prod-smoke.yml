# The prober runs itself · the live site answers every day.
# scripts/lens/prod-smoke.mjs replays the sitemap (every URL → 200), the
# doorway stubs, the share cards (derived from the generator table — the
# og-timeline 404 of 2026-07-22 is the incident this schedule converts)
# and every machine twin, against https://nika.sh. A prober nobody runs
# probes nothing; this cron is the structural fix.
#
# SECURITY: zero run: event data · every step a SHA-pinned uses: · the
# script is plain Node (global fetch, no install step, no dependencies).

name: prod-smoke

on:
  schedule:
    - cron: '13 7 * * *' # daily · after the deploy + heal + resync windows
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: prod-smoke
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          package-manager-cache: false
      - name: Smoke the live site
        run: node scripts/lens/prod-smoke.mjs
