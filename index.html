      crossorigin
    />
    <!-- sovereign analytics (W12a · FRONT F) · self-hosted umami, cookieless,
         IP-anonymized (telemetry canon: no vendor, no PII). INERT until the
         instance exists: loads ONLY on the prod hostname AND once the website
         id below is configured — dev/previews/blocked = zero requests. -->
    <script>
      ;(function () {
        var UMAMI_ID = 'TODO' /* set when stats.nika.sh is live (W12a·F) */
        if (location.hostname !== 'nika.sh' || UMAMI_ID === 'TODO') return
        var s = document.createElement('script')
        s.defer = true
        s.src = 'https://stats.nika.sh/script.js'
        s.setAttribute('data-website-id', UMAMI_ID)
        document.head.appendChild(s)
      })()
    </script>
  </head>
  <body>
    <script>
      /* reveal watchdog (W19b) · the entrance choreography hides prerendered
         content until each section's observer arms it — correct on fast
         devices, a blank wall when hydration is slow (LH mobile measured the
         hero LCP at 9.5s · 95% render delay). If hydration hasn't landed in
         1.6s, force every reveal to its SETTLED state using the same classes
         the observers add — CSS semantics (containing blocks, will-change)
         stay byte-identical, so fixed-position descendants never re-anchor.
         React sets data-hydrated in RootLayout; no-JS UAs never run the
         hiding path at all. Lives in <body>, NOT <head>: the SSG head rewrite
         mangles inline scripts there (the JS leaked as visible text). */
      setTimeout(function () {
        if (document.documentElement.hasAttribute('data-hydrated')) return
        document.querySelectorAll('.v4sec').forEach(function (s) { s.classList.add('v4-in') })
        document.querySelectorAll('.rv').forEach(function (r) { r.classList.add('in') })
      }, 1600)
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
